name: mansapay

services:
  postgres:
    image: postgres:15
    container_name: mansapay-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mansapay}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mansapay}
      POSTGRES_DB: ${POSTGRES_DB:-mansapay}
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-mansapay} -d ${POSTGRES_DB:-mansapay}']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: mansapay-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data:
